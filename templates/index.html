<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Python browser game</div>
        <h1>Tic-Tac-Toe</h1>
        <p>Play locally in your browser. X starts, O follows, and the board resets in one click.</p>
      </section>

      <section class="game-card" aria-label="Tic tac toe game">
        <div class="status-row">
          <div>
            <span class="label">Turn</span>
            <strong id="turnIndicator">X</strong>
          </div>
          <div>
            <span class="label">Result</span>
            <strong id="resultIndicator">In progress</strong>
          </div>
          <button id="resetButton" type="button">Reset board</button>
        </div>

        <div class="board" id="board" role="grid" aria-label="Tic tac toe board"></div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
  </body>
</html>
